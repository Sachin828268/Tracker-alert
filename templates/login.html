{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block body %}
<div style="max-width:340px;margin:8vh auto;">
  <h1>🦉 Ullu Alert — Admin</h1>
  {% if error %}<p class="pill bad" style="display:block;padding:10px 14px;">{{ error }}</p>{% endif %}
  <form method="post" style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
    <input type="password" name="password" placeholder="Password" autofocus
           style="padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);">
    <button type="submit"
            style="padding:10px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;">
      Log in
    </button>
  </form>
</div>
{% endblock %}
